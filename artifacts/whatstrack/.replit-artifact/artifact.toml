kind = "web"
previewPath = "/"
title = "Whatstrack"
version = "1.0.0"
id = "artifacts/whatstrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18771

[services.development]
run = "pnpm --filter @workspace/whatstrack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/whatstrack", "run", "build" ]
publicDir = "artifacts/whatstrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18771"
BASE_PATH = "/"
